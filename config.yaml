# Personality — the AI's voice and style
system_prompt: |
  You are a friendly, casual companion. You speak naturally like a close
  friend would. Keep responses concise (2-3 sentences) since this is a
  voice conversation. Be warm, use casual language, avoid being formal.

# Raw audio capture settings
audio:
  sample_rate: 16000
  frame_duration_ms: 20
  channels: 1

# Voice Activity Detection — tunes interrupt sensitivity
vad:
  aggressiveness: 2
  speech_start_frames: 6
  ring_buffer_size: 8
  # With aec.enabled = true this flag is ignored — AEC removes echo so barge-in
  # is always safe.  With aec.enabled = false, set true only with headphones.
  barge_in_while_speaking: false

# Deepgram live transcription settings (nova-3 is the current flagship model)
deepgram:
  model: "nova-3"
  language: "en"
  endpointing: 300
  utterance_end_ms: 1000
  smart_format: true

# OpenAI LLM settings
llm:
  model: "gpt-4o-mini"
  temperature: 0.8
  max_tokens: 500

# Acoustic Echo Cancellation — set enabled: true for true full-duplex.
# Requires: brew install speexdsp && pip install speexdsp (macOS)
#           apt install libspeexdsp-dev && pip install speexdsp (Debian)
# When disabled, the half-duplex fallback (silence injection) is used instead.
aec:
  enabled: true
  # speexdsp echo tail in samples; 2048 = 128 ms at 16 kHz (covers most rooms)
  filter_length: 2048
  # Typical macOS hardware/buffer latency (60ms) helps speexdsp align the frames
  speaker_delay_ms: 60
  # Ring-buffer depth for speaker reference frames; 200 ≈ 4 s at 20 ms/frame
  ref_buffer_frames: 200
  # Extra transcript guard after speech output ends; catches residual leakage
  # that survives AEC or remains in the OS/hardware output buffers.
  residual_echo_guard_ms: 2000
  interrupted_echo_guard_ms: 600

# Text-to-speech — local piper-tts subprocess + PyAudio output pipeline
tts:
  # Path to the piper .onnx voice model (also settable via PIPER_MODEL env var)
  model_path: "models/en_US-lessac-medium.onnx"
  piper_bin: "piper"
  rate: 175
  volume: 0.9
  # Kept for the aec.enabled=false half-duplex fallback:
  # keep mic muted this many ms after TTS finishes (room echo tail).
  echo_suppress_tail_ms: 350

# Conversation persistence
history:
  file: "conversation_history.json"
  max_messages_in_context: 50
